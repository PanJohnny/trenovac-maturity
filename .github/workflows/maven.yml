name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  release:
    types: [ "published" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml

  attach-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Find built jar
        id: artifact
        run: |
          JAR=$(ls target/*.jar 2>/dev/null | grep -Ev "(sources|javadoc)" | head -n1 || true)
          if [ -z "$JAR" ]; then
            echo "No jar found in target/"
            exit 1
          fi
          echo "path=$JAR" >> $GITHUB_OUTPUT
          echo "name=$(basename $JAR)" >> $GITHUB_OUTPUT
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ${{ steps.artifact.outputs.path }}
          asset_name: ${{ steps.artifact.outputs.name }}
          asset_content_type: application/java-archive
