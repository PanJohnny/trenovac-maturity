name: Java CI with Maven

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Upload jar to workflow artifacts (for reuse in release job)
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            target/*.jar
            !target/*-sources.jar
            !target/*-javadoc.jar

  attach-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jars
          path: target

      - name: List files to upload (debug)
        run: ls -la target

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/*.jar
            !target/*-sources.jar
            !target/*-javadoc.jar
