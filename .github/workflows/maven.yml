name: Release Native Installers
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            type: exe
          - os: ubuntu-latest
            type: app-image # We build the image, then manual tar.gz it
          - os: macos-latest
            type: dmg

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: 'maven'

      - name: Extract Version from POM
        shell: bash
        run: echo "APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $GITHUB_ENV

      - name: Build Shaded JAR
        run: mvn clean package -DskipTests

      - name: Generate Native Bundle
        shell: bash
        run: |
          jpackage \
            --type ${{ matrix.type }} \
            --dest dist \
            --name "TrenovacMaturity" \
            --vendor "PanJohnny" \
            --input target/ \
            --main-jar trenovac-maturity-${{ env.APP_VERSION }}.jar \
            --main-class me.panjohnny.trenovacmaturity.Launcher \
            --app-version "${{ env.APP_VERSION }}" \
            ${{ matrix.os == 'windows-latest' && '--win-shortcut --win-menu' || '' }}

      # Linux Specific: Package the app-image into a tar.gz
      - name: Package Linux tar.gz
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czvf TrenovacMaturity-linux-x64.tar.gz TrenovacMaturity/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/**
          generate_release_notes: true